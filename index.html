// ── Hafif SVG grafik bileşenleri (Recharts yerine) ────────────────────────
function PieChart({data,colors}){
  const size=160,cx=80,cy=80,r=55,ir=32;
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return null;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const a=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+a),iy2=cy+ir*Math.sin(angle+a);
    const large=a>Math.PI?1:0;
    const path=`M${ix1},${iy1} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} L${ix2},${iy2} A${ir},${ir},0,${large},0,${ix1},${iy1}Z`;
    angle+=a;
    return <path key={i} d={path} fill={colors[i%colors.length]} opacity={0.9}/>;
  });
  return <svg width={size} height={size} style={{display:'block',margin:'0 auto'}}>{slices}</svg>;
}

function BarChartH({data,color='#c0392b'}){
  if(!data||data.length===0)return null;
  const max=Math.max(...data.map(d=>d.value),1);
  return <div style={{padding:'4px 0'}}>
    {data.map((d,i)=>(
      <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <div style={{width:80,fontSize:10,color:'#555',textAlign:'right',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.label}</div>
        <div style={{flex:1,background:'#f5f5f5',borderRadius:99,height:18,overflow:'hidden'}}>
          <div style={{width:`${(d.value/max)*100}%`,height:'100%',background:color,borderRadius:99,transition:'width .5s',display:'flex',alignItems:'center',paddingLeft:6}}>
            {(d.value/max)>0.25&&<span style={{fontSize:9,color:'#fff',fontWeight:600,whiteSpace:'nowrap'}}>{new Intl.NumberFormat('tr-TR',{maximumFractionDigits:0}).format(d.value)}₺</span>}
          </div>
        </div>
      </div>
    ))}
  </div>;
}

function LineChartSimple({data}){
  if(!data||data.length<2)return null;
  const W=300,H=80,pad=30;
  const vals=data.map(d=>d.value);
  const minV=Math.min(...vals),maxV=Math.max(...vals,1);
  const pts=data.map((d,i)=>{
    const x=pad+(i/(data.length-1))*(W-pad*2);
    const y=H-pad-((d.value-minV)/(maxV-minV||1))*(H-pad*2);
    return [x,y];
  });
  const polyline=pts.map(p=>p.join(',')).join(' ');
  return <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
    <polyline points={polyline} fill="none" stroke="#c0392b" strokeWidth="2.5" strokeLinejoin="round"/>
    {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="4" fill="#c0392b"/>)}
    {data.map((d,i)=>{
      const [x,y]=pts[i];
      return <text key={i} x={x} y={H-4} textAnchor="middle" fontSize="9" fill="#888">{d.label}</text>;
    })}
    {pts.map(([x,y],i)=>{
      return <text key={i} x={x} y={y-8} textAnchor="middle" fontSize="9" fill="#c0392b" fontWeight="600">{data[i].value}K</text>;
    })}
  </svg>;
}

// ── CASCADE PLANNER ──────────────────────────────────────────────────────────
// Her ay tüm borçları birlikte hesaplar, kapanan borcun nakitini aktarır
function buildCascadePlan(debts, salary, incomes, strategy, livingCost, recurringExp){
  strategy = strategy || "avalanche";
  livingCost = livingCost || 15000;

  const MNAMES = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  // Başlangıç: Mart 2026 = ay index 2
  const START_YEAR = 2026, START_MONTH = 2;

  function monthIncome(mi){
    const absMonth = START_MONTH + mi;
    const m = absMonth % 12; // 0-indexed ay
    let total = salary;
    (incomes||[]).forEach(inc => {
      if(!inc.recurring && !inc.amount) return;
      const skip = inc.skipMonths || ((inc.label||"").toLowerCase().includes("ek ders") ? [6,7,8] : []);
      if(skip.includes(m)) return;
      total += (inc.amount||0);
    });
    return total;
  }

  function monthLabel(mi){
    const absMonth = START_MONTH + mi;
    const m = absMonth % 12;
    const y = START_YEAR + Math.floor(absMonth / 12);
    return MNAMES[m] + " " + y;
  }

  function monthStr(mi){
    const absMonth = START_MONTH + mi;
    const m = absMonth % 12;
    const y = START_YEAR + Math.floor(absMonth / 12);
    return y + "-" + String(m+1).padStart(2,"0");
  }

  // Borç durumunu kopyala
  const state = (debts||[]).map(d => ({
    id: d.id,
    name: d.name,
    type: d.type,
    rem: Number(d.remaining) || 0,
    rate: Number(d.rate) || 0,
    monthly: Number(d.monthly) || 0,
    done: false,
  }));

  const log = [];
  let carryOver = 0;

  for(let mi = 0; mi < 120; mi++){
    const active = state.filter(s => !s.done && s.rem > 0);
    if(active.length === 0) break;

    const ms = monthStr(mi);
    const label = monthLabel(mi);
    const income = monthIncome(mi);

    // Bu ay kart borçlarına geçmiş taksit ekle
    const additions = (DEBT_ADDITIONS||[]).filter(a => a.month === ms);
    additions.forEach(a => {
      const debt = state.find(s => !s.done && s.name.toLowerCase().includes(a.debtName.toLowerCase()) && s.type === "kredi_karti");
      if(debt) debt.rem += a.amount;
    });

    const fixed = active.filter(d => d.type === "kredi");
    const flex  = active.filter(d => d.type !== "kredi");

    const fixedTotal = fixed.reduce((s,d) => s + Math.min(d.monthly, d.rem), 0);

    // Kullanılabilir nakit
    const carryOverThisMonth = carryOver;
    const available = Math.max(0, income + carryOver - fixedTotal - livingCost);
    carryOver = 0;

    // Strateji sıralaması
    let sorted;
    if(strategy === "avalanche") sorted = [...flex].sort((a,b) => b.rate - a.rate || b.rem - a.rem);
    else if(strategy === "snowball") sorted = [...flex].sort((a,b) => a.rem - b.rem);
    else sorted = [...flex];

    // Ödeme dağıtımı
    const pays = {};
    fixed.forEach(d => { pays[d.id] = Math.min(d.monthly, d.rem); });

    if(strategy === "minimum"){
      sorted.forEach(d => {
        pays[d.id] = Math.min(Math.ceil(d.rem * 0.20), d.rem);
      });
    } else if(strategy === "manuel"){
      // Manuel: her borcun userPayment'ını kullan (en az min)
      sorted.forEach(d => {
        const interest = Math.round(d.rem * d.rate / 100);
        const minPay = Math.min(Math.ceil(d.rem * 0.20) + interest, d.rem + interest);
        const manual = d.userPayment ? d.userPayment + interest : minPay;
        pays[d.id] = Math.min(Math.max(manual, minPay), d.rem + interest);
      });
    } else {
      // 1) Herkese minimum öde
      let rem = available;
      sorted.forEach(d => {
        const interest = Math.round(d.rem * d.rate / 100);
        const min = Math.min(Math.ceil(d.rem * 0.20) + interest, d.rem + interest);
        pays[d.id] = Math.min(min, rem);
        rem -= pays[d.id];
      });
      rem = Math.max(0, rem);
      // 2) Kalan nakiti stratejiye göre öncelikli borca ver
      for(let i = 0; i < sorted.length && rem > 0; i++){
        const d = sorted[i];
        const interest = Math.round(d.rem * d.rate / 100);
        const fullPayoff = d.rem + interest;
        const add = Math.min(rem, fullPayoff - pays[d.id]);
        if(add > 0){ pays[d.id] += add; rem -= add; }
      }
    }

    // Ödemeleri uygula
    const payments = [];
    let monthTotal = 0;
    state.forEach(debt => {
      if(debt.done) return;
      const pay = pays[debt.id] || 0;
      let interest = 0, principal = pay;
      if(debt.type !== "kredi"){
        interest = Math.round(debt.rem * debt.rate / 100);
        principal = Math.max(0, pay - interest);
      }
      principal = Math.min(principal, debt.rem);
      debt.rem = Math.max(0, debt.rem - principal);
      if(debt.rem < 1){ debt.rem = 0; debt.done = true; }
      const p = Math.round(interest + principal);
      payments.push({
        id: debt.id, name: debt.name, type: debt.type,
        payment: p, interest: Math.round(interest),
        principal: Math.round(principal),
        remaining: Math.round(debt.rem),
        finished: debt.done,
      });
      monthTotal += p;
    });

    // Surplus hesapla ve devret
    const surplus = Math.max(0, available - (monthTotal - fixedTotal));
    carryOver = surplus;

    log.push({ label, monthIdx: mi, income, carryOver: carryOverThisMonth, livingCost, additions, payments, total: monthTotal, surplus });
  }

  return log;
}

function buildFlexPlan(debt){
  const rate=debt.rate/100;
  const pay=debt.userPayment||debt.monthly;
  let rem=debt.remaining; const plan=[];
  for(let i=0;i<120&&rem>1;i++){
    const int=Math.round(rem*rate);
    const actual=Math.max(pay,int+1);
    const prin=Math.min(actual-int,rem);
    rem=Math.max(0,rem-prin);
    const d=new Date(2026,2+i,debt.payDay||15);
    plan.push({month:i+1,label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,date:`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`,payment:Math.round(int+prin),interest:Math.round(int),principal:Math.round(prin),remaining:Math.round(rem)});
    if(rem<=0)break;
  }
  return plan;
}

function buildFixedPlan(debt){
  return Array.from({length:debt.months},(_,i)=>{
    const d=new Date(2026,2+i,debt.payDay||5);
    return {month:i+1,label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,date:`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`,payment:debt.monthly,interest:null,principal:null,remaining:Math.max(0,debt.remaining-debt.monthly*(i+1))};
  });
}

function calcSmart(debts,income,living){
  const fixedTotal=debts.filter(d=>d.type==="kredi").reduce((s,d)=>s+d.monthly,0);
  const available=Math.max(0,income-fixedTotal-living);
  const flex=[...debts.filter(d=>d.type!=="kredi")].sort((a,b)=>b.rate-a.rate);
  if(!flex.length||available<=0)return{payments:[],available,fixedTotal,living,surplus:0};
  // %20 minimum ödeme zorunluluğu
  const payments=flex.map(d=>{
    const intOnly=Math.ceil(d.remaining*(d.rate/100));
    const minByRate=intOnly+1;
    const minByPct=Math.ceil(d.remaining*0.20);
    const minPay=Math.max(minByRate,minByPct);
    return{id:d.id,name:d.name,type:d.type,remaining:d.remaining,rate:d.rate,minPay,suggested:minPay};
  });
  let extra=available-payments.reduce((s,p)=>s+p.minPay,0);
  if(extra<0){
    payments.forEach(p=>{p.suggested=Math.max(p.minPay,Math.round(available*(p.remaining/flex.reduce((s,d)=>s+d.remaining,0))));});
  } else {
    for(let i=0;i<payments.length&&extra>0;i++){
      const add=Math.min(extra,Math.max(0,payments[i].remaining*1.05-payments[i].suggested));
      payments[i].suggested+=Math.round(add);extra-=Math.round(add);
    }
  }
  payments.forEach(p=>{
    let rem=p.remaining;const rate=p.rate/100;let months=0;
    while(rem>0&&months<120){const int=rem*rate;const prin=Math.max(0,p.suggested-int);rem-=prin;months++;if(prin<=0)break;}
    p.finishMonths=months;
    const fd=new Date(2026,2+months-1,1);p.finishLabel=`${MONTHS[fd.getMonth()]} ${fd.getFullYear()}`;
    p.totalInterest=Math.round(p.suggested*months-p.remaining);
    let remMin=p.remaining;let mMin=0;
    while(remMin>0&&mMin<240){const int=remMin*rate;const prin=Math.max(0,p.minPay-int);remMin-=prin;mMin++;if(prin<=0)break;}
    p.savedVsMin=Math.max(0,(p.minPay*mMin-p.remaining)-(p.suggested*months-p.remaining));
  });
  return{payments,available,fixedTotal,living,surplus:Math.round(available-payments.reduce((s,p)=>s+p.suggested,0))};
}

// localStorage (offline backup)
function useLS(key,defaultVal){
  const [val,setVal]=React.useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):defaultVal;}
    catch{return defaultVal;}
  });
  const setAndSave=useCallback(function(v){
    setVal(function(prev){
      const next=typeof v==="function"?v(prev):v;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      return next;
    });
  },[key]);
  return [val,setAndSave];
}

  function buildCardExpenses(card, category, icon, amt, inst, purchaseDateStr){
    const purchaseDate = new Date(purchaseDateStr || new Date().toISOString().slice(0,10));
    const kesim = card.kesimGunu || 1;
    const purchaseDay = purchaseDate.getDate();
    let firstMonth = purchaseDate.getMonth();
    let firstYear = purchaseDate.getFullYear();
    // Kesim günü geçmişse bir sonraki aya
    if(purchaseDay >= kesim){ firstMonth++; if(firstMonth>11){firstMonth=0;firstYear++;} }
    const installAmt = Math.round(amt / inst);
    const exps = [];
    for(let i=0; i<inst; i++){
      let m = firstMonth+i; let y = firstYear;
      while(m>11){m-=12;y++;}
      const payDay = card.sonOdemeGunu || card.payDay || 1;
      const dateStr = y+"-"+String(m+1).padStart(2,"0")+"-"+String(payDay).padStart(2,"0");
      exps.push({
        id: Date.now()+i,
        category, icon, amount: installAmt,
        date: dateStr, payMethod:"kredi_karti",
        cardId: card.id, installments: inst,
        installmentAmt, installmentNo: i+1,
        totalInstallments: inst,
        isInstallment: inst>1,
        note: inst>1 ? `${i+1}/${inst}. taksit` : ""
      });
    }
    return exps;
  }

    const planRows=[["AY","BORÇ ADI","TİP","ÖDEME TARİHİ","ÖDEME TUTARI","FAİZ","ANAPARA","KALAN BORÇ"]];

        planRows.push([mg.label,p.debtName,p.debtType==="kredi"?"Kredi":p.debtType==="kredi_karti"?"K.Kartı":"KMH",p.date,p.payment,p.interest||"-",p.principal||"-",p.remaining]);

                ...d,
                id:Date.now()+i+100,
                total:d.remaining,
                userPayment:d.type!=="kredi"?Math.ceil(d.remaining*0.20):null,
                monthly:d.type==="kredi"?d.monthly:Math.ceil(d.remaining*0.20),
              })));
              setRecurringExp(wizardData.recurring.map((r,i)=>({...r,id:Date.now()+i+200})));
              setExpenses([]);
              setShowWizard(false);
              setWizardStep(0);
            }} style={{flex:2,background:"#27ae60",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>✅ Onayla & Başla</button>}
          </div>
          <button onClick={()=>{setShowWizard(false);setWizardStep(0);}} style={{width:"100%",background:"none",border:"none",color:"#aaa",fontSize:11,cursor:"pointer",marginTop:8,fontFamily:"'Sora',sans-serif"}}>İptal</button>
        </div>
      </div>
    </div>}
    {showDistribute&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:20,padding:20,width:"100%",maxWidth:440,maxHeight:"80vh",overflowY:"auto"}}>
          <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>⚡ Nakiti Dağıt</div>
          <div style={{fontSize:12,color:"#888",marginBottom:16}}>Tutarları istediğin gibi değiştirebilirsin.</div>
          {debts.filter(d=>d.type!=="kredi"&&distPays[d.id]!==undefined).map(d=>(
            <div key={d.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{flex:1,fontSize:13,fontWeight:600}}>{d.name}</div>
              <div style={{fontSize:10,color:"#888",minWidth:60}}>kalan: {fmt(d.remaining)}</div>
              <input type="number" value={distPays[d.id]||0} onChange={e=>setDistPays(p=>({...p,[d.id]:Number(e.target.value)}))} style={{width:100,border:"1.5px solid #ddd",borderRadius:8,padding:"6px 8px",fontSize:13,textAlign:"right"}}/>
            </div>
          ))}
          <div style={{borderTop:"1px solid #eee",paddingTop:10,marginTop:4,fontSize:12,color:"#666",marginBottom:14}}>
            Toplam dağıtım: <strong style={{color:"#27ae60"}}>{fmt(Object.values(distPays).reduce((s,v)=>s+v,0))}</strong>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setDebts(p=>p.map(d=>distPays[d.id]!==undefined?{...d,userPayment:distPays[d.id]}:d));setShowDistribute(false);}} style={{flex:1,background:"#27ae60",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>✅ Uygula</button>
            <button onClick={()=>setShowDistribute(false)} style={{flex:1,background:"#eee",color:"#555",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:600,cursor:"pointer"}}>İptal</button>
          </div>
        </div>
      </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
