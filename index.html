const fmt=n=>new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n);

function buildFlexPlan(debt){
  const rate=debt.rate/100;
  const pay=debt.userPayment||debt.monthly;
  let rem=debt.remaining; const plan=[];
  for(let i=0;i<120&&rem>1;i++){
    const int=Math.round(rem*rate);
    const actual=Math.max(pay,int+1);
    const prin=Math.min(actual-int,rem);
    rem=Math.max(0,rem-prin);
    const d=new Date(2026,2+i,debt.payDay||15);
    plan.push({month:i+1,label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,date:`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`,payment:Math.round(int+prin),interest:Math.round(int),principal:Math.round(prin),remaining:Math.round(rem)});
    if(rem<=0)break;
  }
  return plan;
}

function buildFixedPlan(debt){
  return Array.from({length:debt.months},(_,i)=>{
    const d=new Date(2026,2+i,debt.payDay||5);
    return {month:i+1,label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,date:`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`,payment:debt.monthly,interest:null,principal:null,remaining:Math.max(0,debt.remaining-debt.monthly*(i+1))};
  });
}

function calcSmart(debts,income,living){
  const fixedTotal=debts.filter(d=>d.type==="kredi").reduce((s,d)=>s+d.monthly,0);
  const available=Math.max(0,income-fixedTotal-living);
  const flex=[...debts.filter(d=>d.type!=="kredi")].sort((a,b)=>b.rate-a.rate);
  if(!flex.length||available<=0)return{payments:[],available,fixedTotal,living,surplus:0};
  const payments=flex.map(d=>{const minPay=Math.ceil(d.remaining*(d.rate/100))+1;return{id:d.id,name:d.name,type:d.type,remaining:d.remaining,rate:d.rate,minPay,suggested:minPay};});
  let extra=available-payments.reduce((s,p)=>s+p.minPay,0);
  if(extra<0){payments.forEach(p=>{p.suggested=Math.max(p.minPay,Math.round(available*(p.remaining/flex.reduce((s,d)=>s+d.remaining,0))));});}
  else{for(let i=0;i<payments.length&&extra>0;i++){const add=Math.min(extra,Math.max(0,payments[i].remaining*1.05-payments[i].suggested));payments[i].suggested+=Math.round(add);extra-=Math.round(add);}}
  payments.forEach(p=>{
    let rem=p.remaining;const rate=p.rate/100;let months=0;
    while(rem>0&&months<120){const int=rem*rate;const prin=Math.max(0,p.suggested-int);rem-=prin;months++;if(prin<=0)break;}
    p.finishMonths=months;
    const fd=new Date(2026,2+months-1,1);p.finishLabel=`${MONTHS[fd.getMonth()]} ${fd.getFullYear()}`;
    p.totalInterest=Math.round(p.suggested*months-p.remaining);
    let remMin=p.remaining;let mMin=0;
    while(remMin>0&&mMin<240){const int=remMin*rate;const prin=Math.max(0,p.minPay-int);remMin-=prin;mMin++;if(prin<=0)break;}
    p.savedVsMin=Math.max(0,(p.minPay*mMin-p.remaining)-(p.suggested*months-p.remaining));
  });
  return{payments,available,fixedTotal,living,surplus:Math.round(available-payments.reduce((s,p)=>s+p.suggested,0))};
}

  </button>;
}
function Card({children,style={}}){

// ── MAIN APP ─────────────────────────────────────────────────────────────────

  const [debts,setDebts]=useState(initDebts);
  const [expenses,setExpenses]=useState(initExpenses);

  const [showAddDebt,setShowAddDebt]=useState(false);
  const [showAddExp,setShowAddExp]=useState(false);
  const [showAddIncome,setShowAddIncome]=useState(false);
  const [showPurchase,setShowPurchase]=useState(false);  // kart alışverişi

  const blankDebt={name:"",type:"kredi",remaining:"",monthly:"",rate:"",months:"",payDay:"",userPayment:"",kesimGunu:"",sonOdemeGunu:""};
  const [dForm,setDForm]=useState(blankDebt);

  const blankExp={category:"Market",amount:"",date:new Date().toISOString().slice(0,10),payMethod:"nakit",cardId:"",installments:1};
  const [eForm,setEForm]=useState(blankExp);

  const [iForm,setIForm]=useState({label:"",amount:"",date:new Date().toISOString().slice(0,10),recurring:false});

  // Kart alışverişi formu
  const blankPurchase={cardId:"",description:"",amount:"",installments:1,date:new Date().toISOString().slice(0,10)};
  const [pForm,setPForm]=useState(blankPurchase);

  // Hesaplamalar
  const curMonth=new Date().toISOString().slice(0,7);
  const thisMonthExtra=incomes.filter(e=>e.recurring||e.date.slice(0,7)===curMonth).reduce((s,e)=>s+e.amount,0);
  const totalIncome=salary+thisMonthExtra;
  const totalDebt=debts.reduce((s,d)=>s+d.remaining,0);
  const totalMonthly=debts.reduce((s,d)=>s+(d.type!=="kredi"&&d.userPayment?d.userPayment:d.monthly),0);
  const totalExpenses=expenses.filter(e=>e.date.slice(0,7)===curMonth).reduce((s,e)=>s+e.amount,0);
  const freeIncome=totalIncome-totalMonthly-totalExpenses;
  const debtRatio=((totalMonthly/totalIncome)*100).toFixed(0);
  const estLiving=totalExpenses>0?totalExpenses:Math.round(totalIncome*0.35);
  const smart=calcSmart(debts,totalIncome,estLiving);

  const creditCards=debts.filter(d=>d.type==="kredi_karti");

  // Kredi kartları için bu ay son ödeme uyarısı
  const today=new Date();
  const cardAlerts=creditCards.map(c=>{
    if(!c.sonOdemeGunu)return null;
    const son=new Date(today.getFullYear(),today.getMonth(),c.sonOdemeGunu);
    const diffDays=Math.ceil((son-today)/(1000*60*60*24));
    if(diffDays>=0&&diffDays<=7)return{id:c.id,name:c.name,diffDays,son};
    return null;
  }).filter(Boolean);

  // Master ödeme planı
  function masterPlan(){
    const all=[];
    debts.forEach(d=>{
      const plan=d.type==="kredi"?buildFixedPlan(d):buildFlexPlan(d);
      plan.forEach(r=>all.push({...r,debtName:d.name,debtType:d.type}));
    });
    const grouped={};
    all.forEach(p=>{
      if(!grouped[p.label])grouped[p.label]={label:p.label,month:p.month,payments:[],total:0};
      grouped[p.label].payments.push(p);grouped[p.label].total+=p.payment;
    });
    return Object.values(grouped).sort((a,b)=>a.month-b.month);
  }
  const plan=useMemo(()=>masterPlan(),[debts]);
  const longestMonths=Math.max(...debts.map(d=>(d.type==="kredi"?buildFixedPlan(d):buildFlexPlan(d)).length));

  // ── ACTIONS ──────────────────────────────────────────────────────────────
  function saveDebt(){
    if(!dForm.name||!dForm.remaining)return;
    const d={...dForm,id:editDebtId||Date.now(),remaining:Number(dForm.remaining),monthly:Number(dForm.monthly),rate:Number(dForm.rate),months:dForm.months?Number(dForm.months):null,payDay:Number(dForm.payDay)||15,userPayment:dForm.type!=="kredi"?Number(dForm.userPayment||dForm.monthly):null,total:Number(dForm.remaining),kesimGunu:Number(dForm.kesimGunu)||null,sonOdemeGunu:Number(dForm.sonOdemeGunu)||null};
    if(editDebtId){setDebts(p=>p.map(x=>x.id===editDebtId?d:x));}
    else{setDebts(p=>[...p,d]);}
    setDForm(blankDebt);setEditDebtId(null);setShowAddDebt(false);
  }
  function startEdit(debt){
    setDForm({name:debt.name,type:debt.type,remaining:debt.remaining,monthly:debt.monthly,rate:debt.rate,months:debt.months||"",payDay:debt.payDay||"",userPayment:debt.userPayment||"",kesimGunu:debt.kesimGunu||"",sonOdemeGunu:debt.sonOdemeGunu||""});
    setEditDebtId(debt.id);setShowAddDebt(true);
  }
  function deleteDebt(id){if(window.confirm("Bu borcu silmek istiyor musun?"))setDebts(p=>p.filter(d=>d.id!==id));}

  function saveExpense(){
    if(!eForm.amount||!eForm.category)return;
    const cat=CATS.find(c=>c.name===eForm.category);
    setExpenses(p=>[...p,{id:Date.now(),...eForm,amount:Number(eForm.amount),icon:cat?.icon||"📌",cardId:eForm.cardId?Number(eForm.cardId):null,installments:Number(eForm.installments)||1}]);
    setEForm(blankExp);setShowAddExp(false);
  }

  function savePurchase(){
    if(!pForm.cardId||!pForm.amount)return;
    const card=debts.find(d=>d.id===Number(pForm.cardId));
    if(!card)return;
    const installAmt=Math.round(Number(pForm.amount)/Number(pForm.installments));
    // Kart borcuna ekle
    setDebts(p=>p.map(d=>d.id===Number(pForm.cardId)?{...d,remaining:d.remaining+Number(pForm.amount),total:d.total+Number(pForm.amount)}:d));
    // Gider olarak kaydet
    setExpenses(p=>[...p,{id:Date.now(),category:pForm.description||"Alışveriş",amount:Number(pForm.amount),date:pForm.date,icon:"🛒",payMethod:"kredi_karti",cardId:Number(pForm.cardId),installments:Number(pForm.installments),installmentAmt}]);
    setPForm(blankPurchase);setShowPurchase(false);
  }

  function updateUserPayment(id,val){setDebts(p=>p.map(d=>d.id===id?{...d,userPayment:Math.max(0,Number(val))}:d));}

  function applySmart(){
    setDebts(p=>p.map(d=>{const s=smart.payments.find(x=>x.id===d.id);return s?{...d,userPayment:s.suggested}:d;}));
    setSuggApplied(true);setTab("plan");
  }

    setAiLoading(true);setAiAdvice(null);
    const prompt=`Sen bir Türk kişisel finans uzmanısın.\nMAAŞ: ${fmt(salary)} | EK GELİR: ${fmt(thisMonthExtra)} | TOPLAM: ${fmt(totalIncome)}\nBORÇ: ${fmt(totalDebt)} | AYLIK ÖDEME: ${fmt(totalMonthly)} (%${debtRatio})\nGİDER: ${fmt(totalExpenses)} | NET: ${fmt(freeIncome)}\n\nSABİT KREDİLER:\n${debts.filter(d=>d.type==="kredi").map(d=>`- ${d.name}: ${fmt(d.remaining)}, aylık ${fmt(d.monthly)}, %${d.rate}, ${d.months}ay`).join("\n")}\nESNEK:\n${debts.filter(d=>d.type!=="kredi").map(d=>`- ${d.name}: ${fmt(d.remaining)}, aylık ${fmt(d.userPayment||d.monthly)}, %${d.rate}`).join("\n")}\n\n1. Genel durum (1-2 cümle)\n2. Esnek borçlar için önerilen ödeme tutarı\n3. Öncelikli borç sırası\n4. Bitiş tahmini\n5. 3 pratik öneri\n\nTürkçe, net, max 280 kelime.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const d=await r.json();setAiAdvice(d.content?.[0]?.text||"Yanıt alınamadı.");
    }catch{setAiAdvice("Bağlantı hatası.");}
    setAiLoading(false);
  }

  // ── EXCEL EXPORT ──────────────────────────────────────────────────────────

    const wb=XLSX.utils.book_new();

    const debtRows=[
      ["BORÇ ADI","TİP","KALAN BORÇ","AYLIK ÖDEME","FAİZ %","KALAN AY","ÖDEME GÜNÜ","KESİM GÜNÜ","SON ÖDEME GÜNÜ"],
      ...debts.map(d=>[d.name,d.type==="kredi"?"Kredi":d.type==="kredi_karti"?"Kredi Kartı":"KMH",d.remaining,d.type==="kredi"?d.monthly:(d.userPayment||d.monthly),d.rate,d.months||"Esnek",d.payDay||"-",d.kesimGunu||"-",d.sonOdemeGunu||"-"]),

                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                  <div style={{textAlign:"right"}}><div style={{fontSize:15,fontWeight:800,color:"#c0392b"}}>{fmt(d.remaining)}</div><div style={{fontSize:10,color:"#999"}}>kalan</div></div>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>startEdit(d)} style={{background:"#f0f4ff",color:"#2980b9",border:"1px solid #d0e0ff",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:600}}>✏️ Düzenle</button>
                    <button onClick={()=>deleteDebt(d.id)} style={{background:"#fdf0f0",color:"#c0392b",border:"1px solid #f5c6c0",borderRadius:8,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>🗑</button>
                  </div>
                </div>
              </div>
              <div style={{background:"#f5f5f5",borderRadius:99,height:5,overflow:"hidden",marginBottom:7}}>
                <div style={{width:`${Math.max(pct,2)}%`,height:"100%",background:COLORS[i%COLORS.length],borderRadius:99}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:isFlx?10:0}}>
                <span>%{d.rate} faiz</span>
                <span>Aylık {fmt(isFlx?(d.userPayment||d.monthly):d.monthly)}</span>
                <span>{pl.length} ay</span>
              </div>
              {isFlx&&<div style={{borderTop:"1px solid #f0f0f0",paddingTop:10,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,color:"#555",whiteSpace:"nowrap"}}>Aylık ödemen:</span>
                <input type="number" value={d.userPayment||d.monthly} onChange={e=>updateUserPayment(d.id,e.target.value)} style={{...inp,marginBottom:0,flex:1,textAlign:"right",fontWeight:700,fontSize:13}}/>
                <span style={{fontSize:12,color:"#aaa"}}>₺</span>
              </div>}
              {d.type==="kredi_karti"&&(d.kesimGunu||d.sonOdemeGunu)&&<div style={{marginTop:8,padding:"6px 8px",background:"#fff8e1",borderRadius:8,fontSize:11,color:"#e65100"}}>
                {d.kesimGunu?`📋 Kesim: Ayın ${d.kesimGunu}. günü`:""}  {d.sonOdemeGunu?`💳 Son Ödeme: Ayın ${d.sonOdemeGunu}. günü`:""}
              </div>}
            </Card>;
          })}
        </>}

        {/* ══ GİDERLER ════════════════════════════════════════════════════ */}
        {tab==="giderler"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:13,color:"#666"}}>Bu ay: <strong style={{color:"#1a1a2e"}}>{fmt(totalExpenses)}</strong></div>
            <button onClick={()=>setShowAddExp(!showAddExp)} style={{...btnP,width:"auto",padding:"7px 13px",fontSize:12}}>+ Gider Ekle</button>
          </div>

          {showAddExp&&<Card style={{border:"2px dashed #e0e0e0"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Yeni Gider</div>
            <select style={inp} value={eForm.category} onChange={e=>setEForm({...eForm,category:e.target.value})}>
              {CATS.map(c=><option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
            </select>
            <input style={inp} type="number" placeholder="Tutar (₺)" value={eForm.amount} onChange={e=>setEForm({...eForm,amount:e.target.value})}/>
            <input style={inp} type="date" value={eForm.date} onChange={e=>setEForm({...eForm,date:e.target.value})}/>

            {/* Ödeme yöntemi */}
            <div style={{fontSize:11,color:"#888",marginBottom:6,fontWeight:600}}>💳 Ödeme Yöntemi</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {[["nakit","💵 Nakit"],["kredi_karti","💳 Kart"]].map(([v,l])=>(
                <button key={v} onClick={()=>setEForm({...eForm,payMethod:v,cardId:"",installments:1})} style={{flex:1,padding:"8px",border:`2px solid ${eForm.payMethod===v?"#c0392b":"#e0e0e0"}`,borderRadius:10,background:eForm.payMethod===v?"#fdf0f0":"#fff",color:eForm.payMethod===v?"#c0392b":"#555",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                  {l}
                </button>
              ))}
            </div>

            {eForm.payMethod==="kredi_karti"&&<>
              <select style={inp} value={eForm.cardId} onChange={e=>setEForm({...eForm,cardId:e.target.value})}>
                <option value="">Kart seç...</option>
                {creditCards.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:4}}>Taksit</div>
                  <select style={{...inp,marginBottom:0}} value={eForm.installments} onChange={e=>setEForm({...eForm,installments:Number(e.target.value)})}>
                    {[1,2,3,4,6,9,12,18,24].map(n=><option key={n} value={n}>{n===1?"Tek Çekim":`${n} Taksit`}</option>)}
                  </select>
                </div>
                {eForm.installments>1&&eForm.amount&&<div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:4}}>Aylık</div>
                  <div style={{...inp,marginBottom:0,background:"#f5f5f5",color:"#27ae60",fontWeight:700,display:"flex",alignItems:"center"}}>
                    {fmt(Math.round(Number(eForm.amount)/eForm.installments))}
                  </div>
                </div>}
              </div>
            </>}
            <div style={{marginTop:8,display:"flex",gap:8}}>
              <button onClick={saveExpense} style={btnP}>Kaydet</button>
              <button onClick={()=>setShowAddExp(false)} style={{...btnP,background:"#eee",color:"#555"}}>İptal</button>
            </div>
          </Card>}

          {catData.length>0&&<Card>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Kategorilere Göre</div>
            <ResponsiveContainer width="100%" height={140}>
              <BarChart data={catData} layout="vertical">
                <XAxis type="number" tick={{fontSize:9}} tickFormatter={v=>`${(v/1000).toFixed(0)}K`}/>
                <YAxis type="category" dataKey="name" tick={{fontSize:10}} width={80}/>
                <Tooltip formatter={v=>fmt(v)}/><Bar dataKey="tutar" fill="#c0392b" radius={[0,6,6,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>}

          {[...expenses].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
            const card=e.cardId?debts.find(d=>d.id===e.cardId):null;
            const cat=CATS.find(c=>c.name===e.category);
            return <Card key={e.id} style={{padding:"11px 13px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <div style={{fontSize:22,marginTop:2}}>{cat?.icon||"📌"}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{e.category}</div>
                    <div style={{fontSize:10,color:"#aaa"}}>{new Date(e.date).toLocaleDateString("tr-TR")}</div>
                    <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,background:e.payMethod==="nakit"?"#e8f5e9":"#fff8e1",color:e.payMethod==="nakit"?"#2e7d32":"#e65100",borderRadius:20,padding:"1px 7px",fontWeight:600}}>
                        {e.payMethod==="nakit"?"💵 Nakit":"💳 Kart"}
                      </span>
                      {card&&<span style={{fontSize:10,background:"#f3e8fd",color:"#8e44ad",borderRadius:20,padding:"1px 7px",fontWeight:600}}>{card.name.split(" ").slice(-1)[0]}</span>}
                      {e.installments>1&&<span style={{fontSize:10,background:"#e3f2fd",color:"#1565c0",borderRadius:20,padding:"1px 7px",fontWeight:600}}>{e.installments} Taksit</span>}
                    </div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:14,fontWeight:800,color:"#1a1a2e"}}>{fmt(e.amount)}</div>
                  {e.installments>1&&e.installmentAmt&&<div style={{fontSize:10,color:"#888"}}>{fmt(e.installmentAmt)}/ay</div>}
                </div>
              </div>
            </Card>;
          })}

          <button onClick={exportExcel} style={{...btnS("#27ae60"),marginTop:4}}>📊 Giderleri Excel'e Aktar</button>
        </>}

        {/* ══ ÖDEME ÖNERİSİ ════════════════════════════════════════════════ */}
        {tab==="oneri"&&<>
          <Card style={{background:"linear-gradient(135deg,#c0392b,#922b21)",color:"#fff",padding:"18px 16px"}}>
            <div style={{fontSize:22,marginBottom:6}}>🧠</div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:6}}>Gelire Göre Akıllı Ödeme Önerisi</div>
            <div style={{fontSize:11,opacity:.8,lineHeight:1.7,marginBottom:12}}>Maaş ve ek gelirler hesaba katılarak kalan bütçe <strong>Avalanche yöntemiyle</strong> dağıtıldı.</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[["Toplam Gelir",fmt(totalIncome)],["Sabit Krediler",fmt(smart.fixedTotal)],["Yaşam Gideri",fmt(smart.living)],["Dağıtılabilir",fmt(smart.available)]].map(([l,v])=>(
                <div key={l} style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"7px 10px",flex:"1 1 calc(50% - 4px)"}}>
                  <div style={{fontSize:9,opacity:.75}}>{l}</div><div style={{fontSize:13,fontWeight:800}}>{v}</div>
                </div>
              ))}
            </div>
          </Card>
          {smart.payments.map((p,i)=>{
            const pri=i===0;
            return <Card key={p.id} style={{border:pri?"2px solid #c0392b":"1px solid #f0f0f0"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:pri?"#c0392b":"#ddd",color:pri?"#fff":"#888",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{p.name}</div><TBadge type={p.type}/><span style={{marginLeft:5,fontSize:10,color:"#888"}}>%{p.rate} · {fmt(p.remaining)}</span></div>
                {pri&&<span style={{fontSize:9,background:"#fdf0f0",color:"#c0392b",borderRadius:20,padding:"2px 7px",fontWeight:700}}>ÖNCELİKLİ</span>}
              </div>
              <div style={{background:pri?"#fdf0f0":"#f8f9fa",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{fontSize:11,color:"#888",marginBottom:2}}>Önerilen aylık ödeme</div>
                <div style={{fontSize:26,fontWeight:800,color:pri?"#c0392b":"#1a1a2e"}}>{fmt(p.suggested)}</div>
                <div style={{fontSize:10,color:"#aaa"}}>Min: {fmt(p.minPay)} · +{fmt(p.suggested-p.minPay)} fazla</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                {[["Bitiş",`${p.finishMonths} ay`,"#2e7d32","#e8f5e9"],["Toplam Faiz",fmt(p.totalInterest),"#e65100","#fff8e1"],["Kazanç",fmt(p.savedVsMin),"#1565c0","#e3f2fd"]].map(([l,v,c,bg])=>(
                  <div key={l} style={{flex:1,background:bg,borderRadius:10,padding:"8px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#555",marginBottom:2}}>{l}</div>
                    <div style={{fontSize:12,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
            </Card>;
          })}
          {smart.surplus>0&&<Card style={{background:"#f0fff4",border:"1px solid #b2dfdb"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1b5e20",marginBottom:4}}>🎉 Aylık {fmt(smart.surplus)} artıyor</div>
            <div style={{fontSize:12,color:"#388e3c",lineHeight:1.6}}>Tüm ödemeler sonrası kalan para. Acil fon veya ekstra ödeme için kullanabilirsin.</div>
          </Card>}
          <button onClick={applySmart} style={{...btnP,fontSize:15,padding:"15px",marginBottom:6}}>✅ Bu Tutarları Ödeme Planıma Uygula</button>
          <div style={{fontSize:11,color:"#aaa",textAlign:"center",marginBottom:12}}>Borçlar sekmesinden istediğin zaman değiştirebilirsin</div>
        </>}

        {/* ══ ÖDEME PLANI ══════════════════════════════════════════════════ */}
        {tab==="plan"&&<>
          {suggApplied&&<Card style={{background:"#e8f5e9",border:"1px solid #c8e6c9",padding:"10px 14px",marginBottom:12}}>
            <div style={{fontSize:12,color:"#2e7d32",fontWeight:600}}>✅ Akıllı öneri tutarları uygulandı!</div>
          </Card>}
          <Card style={{background:"linear-gradient(135deg,#1a1a2e,#2c3e50)",color:"#fff",padding:"14px 16px"}}>
            <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>📅 Aylık Ödeme Planım</div>
            <div style={{fontSize:11,opacity:.75,lineHeight:1.7}}>Krediler <strong>sabit</strong>, kredi kartı &amp; KMH <strong>senin belirlediğin tutarla</strong>.</div>
          </Card>
          <Card>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>✏️ Esnek Ödeme Tutarlarım</div>
            {debts.filter(d=>d.type!=="kredi").map(d=>{
              const pl=buildFlexPlan(d);
              const totInt=pl.reduce((s,r)=>s+r.interest,0);
              return <div key={d.id} style={{background:"#f9f9f9",borderRadius:12,padding:"10px 12px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div><div style={{fontSize:12,fontWeight:700}}>{d.name}</div><div style={{fontSize:10,color:"#aaa"}}>{fmt(d.remaining)} · %{d.rate}</div></div>
                  <TBadge type={d.type}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input type="number" value={d.userPayment||d.monthly} onChange={e=>updateUserPayment(d.id,e.target.value)} style={{...inp,marginBottom:0,flex:1,fontWeight:700,fontSize:14,textAlign:"right",background:"#fff"}}/>
                  <span style={{fontSize:12,color:"#888"}}>₺/ay</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:"#888"}}>
                  <span>📆 {pl.length} ay ({pl[pl.length-1]?.label})</span>
                  <span style={{color:"#e67e22"}}>Faiz: {fmt(totInt)}</span>
                </div>
              </div>;
            })}
          </Card>
          <Card>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>🏦 Sabit Taksitli Krediler</div>
            {debts.filter(d=>d.type==="kredi").map(d=>(
              <div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f5f5f5"}}>
                <div><div style={{fontSize:12,fontWeight:600}}>{d.name}</div><div style={{fontSize:10,color:"#aaa"}}>Her ay {d.payDay}. · {d.months} ay kaldı</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:800,color:"#2980b9"}}>{fmt(d.monthly)}</div><div style={{fontSize:10,color:"#aaa"}}>sabit</div></div>
              </div>
            ))}
          </Card>
          <div style={{fontSize:13,fontWeight:700,color:"#1a1a2e",marginBottom:8}}>🗓 Aylık Takvim</div>
          {(showFullPlan?plan:plan.slice(0,6)).map(mg=>(
            <Card key={mg.label} style={{padding:"13px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div><div style={{fontSize:14,fontWeight:800}}>{mg.label}</div><div style={{fontSize:10,color:"#aaa"}}>{mg.payments.length} ödeme</div></div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:15,fontWeight:800,color:"#c0392b"}}>{fmt(mg.total)}</div>
                  <div style={{fontSize:10,color:totalIncome-mg.total>=0?"#27ae60":"#e74c3c",fontWeight:600}}>Kalan: {fmt(totalIncome-mg.total)}</div>
                </div>
              </div>
              {mg.payments.map((p,pi)=>{
                const icon=p.debtType==="kredi"?"🏦":p.debtType==="kmh"?"💜":"💳";
                const bg=p.debtType==="kredi"?"#e3f2fd":p.debtType==="kmh"?"#f3e8fd":"#fff8f0";
                return <div key={pi} className="hover-row" style={{display:"flex",alignItems:"flex-start",padding:"7px 6px",borderRadius:8,marginBottom:2,background:bg,gap:8}}>
                  <div style={{fontSize:17,marginTop:1}}>{icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600}}>{p.debtName}</div>
                    <div style={{fontSize:10,color:"#888"}}>📌 {p.date}</div>
                    {p.debtType!=="kredi"&&p.interest!=null&&<div style={{fontSize:10,color:"#aaa",marginTop:1}}>
                      Faiz: <span style={{color:"#e67e22",fontWeight:600}}>{fmt(p.interest)}</span> · Ana: <span style={{color:"#27ae60",fontWeight:600}}>{fmt(p.principal)}</span> · Kalan: {fmt(p.remaining)}
                    </div>}
                  </div>
                  <div style={{fontSize:14,fontWeight:800,flexShrink:0}}>{fmt(p.payment)}</div>
                </div>;
              })}
              <div style={{marginTop:8,paddingTop:8,borderTop:"2px solid #f0f0f0",display:"flex",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:"#888"}}>Toplam ödeme</span><span style={{fontWeight:800,color:"#c0392b"}}>{fmt(mg.total)}</span>
              </div>
            </Card>
          ))}
          <button onClick={()=>setShowFullPlan(v=>!v)} style={{...btnS("#2c3e50"),marginBottom:12}}>
            {showFullPlan?`▲ Daha Az Göster`:`▼ Tüm Planı Göster (${plan.length} ay)`}
          </button>
          <Card style={{background:"#f8fff8",border:"1px solid #c8e6c9"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#2e7d32",marginBottom:10}}>📊 Toplam Özet</div>
            {debts.map(d=>{
              const pl=d.type==="kredi"?buildFixedPlan(d):buildFlexPlan(d);
              const totPaid=pl.reduce((s,r)=>s+r.payment,0);
              const totInt=pl.reduce((s,r)=>s+(r.interest||0),0);
              return <div key={d.id} style={{padding:"8px 0",borderBottom:"1px solid #e8f5e9"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,fontWeight:600}}>{d.name}</span><span style={{fontSize:12,color:"#c0392b",fontWeight:700}}>{pl.length} ay</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#666"}}>
                  <span>Toplam: {fmt(totPaid)}</span>{totInt>0&&<span style={{color:"#e67e22"}}>Faiz: {fmt(totInt)}</span>}
                </div>
              </div>;
            })}
            <div style={{marginTop:10,display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:800}}>
              <span>Tüm borçlardan kurtulma</span><span style={{color:"#c0392b"}}>{longestMonths} ay</span>
            </div>
          </Card>
          <button onClick={exportExcel} style={btnS("#27ae60")}>📊 Ödeme Planını Excel'e Aktar</button>
        </>}

        {/* ══ AI ═══════════════════════════════════════════════════════════ */}
        {tab==="ai"&&<>
          <Card style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",color:"#fff"}}>
            <div style={{fontSize:20,marginBottom:6}}>🤖</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:5}}>AI Finansal Danışman</div>
            <div style={{fontSize:11,opacity:.7,marginBottom:14,lineHeight:1.6}}>Tüm verilerini analiz ederek kişiselleştirilmiş strateji üretir.</div>
            <button onClick={getAI} disabled={aiLoading} style={{...btnP,background:"#c0392b",opacity:aiLoading?.7:1}}>{aiLoading?"⏳ Analiz ediliyor...":"🎯 Analiz Et & Öneri Al"}</button>
          </Card>
          {aiLoading&&<Card><div className="pulse" style={{textAlign:"center",padding:"20px",color:"#888",fontSize:13}}>Veriler analiz ediliyor...</div></Card>}
          {aiAdvice&&<Card style={{border:"2px solid #f0e8ff"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:"#8e44ad"}}>📋 AI Önerileri</div>
            <div style={{fontSize:13,lineHeight:1.85,color:"#333",whiteSpace:"pre-wrap"}}>{aiAdvice}</div>
          </Card>}
          <Card style={{background:"#fffbf0",border:"1px solid #ffe0b2"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#e65100",marginBottom:8}}>💡 Genel İpuçları</div>
            {["Kredi kartı faizi en yüksek — ödeme tutarını artır","KMH'yı olabildiğince az kullan","Bir kredi kapanınca o taksiti diğer borca yönlendir","Ekstra geliri önce yüksek faizli borca öde","Hesap kesim tarihinden önce harcama yapma — sonraki döneme atar"].map((t,i)=>(
              <div key={i} style={{fontSize:12,color:"#555",padding:"5px 0",display:"flex",gap:8,borderBottom:"1px solid #fff3e0"}}>
                <span style={{color:"#e65100"}}>✓</span><span>{t}</span>
              </div>
            ))}
          </Card>
        </>}

      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
